<body class="bg-surface font-body-md text-on-surface">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden transition-opacity opacity-0 pointer-events-none"></div>

    <!-- SideNavBar (Shared Component) -->
    <aside id="app-sidebar" class="h-screen w-64 fixed left-0 top-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col bg-white border-r border-[#8B5E3C]/15 shadow-xl py-6 z-50">
        <div class="px-6 mb-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">

            </div>
            <div>
                <h2 class="text-lg font-bold text-[#2D5A27]">GreenValley Labs</h2>

            </div>
        </div>
        
        <nav class="flex-1 flex flex-col" id="nav-menu">
            <a href="#dashboard" class="nav-link flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 transition-all hover:translate-x-1 duration-200 cursor-pointer" data-route="dashboard">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-label-md">Overview</span>
            </a>
            <a href="#soil-analysis" class="nav-link flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 transition-all hover:translate-x-1 duration-200 cursor-pointer" data-route="soil-analysis">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">science</span>
                <span class="font-label-md">Lab Sync (Soil)</span>
            </a>
            <a href="#crop-doctor" class="nav-link flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 transition-all hover:translate-x-1 duration-200 cursor-pointer" data-route="crop-doctor">
                <span class="material-symbols-outlined">bug_report</span>
                <span class="font-label-md">Crop Doctor</span>
            </a>
            <a href="#irrigation" class="nav-link flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 transition-all hover:translate-x-1 duration-200 cursor-pointer" data-route="irrigation">
                <span class="material-symbols-outlined">water_drop</span>
                <span class="font-label-md">Irrigation</span>
            </a>
            <a href="#communication" class="nav-link flex items-center gap-3 px-4 py-3 text-zinc-500 hover:bg-zinc-50 transition-all hover:translate-x-1 duration-200 cursor-pointer" data-route="communication">
                <span class="material-symbols-outlined">psychology</span>
                <span class="font-label-md">Yield AI</span>
            </a>
        </nav>

        <div class="mt-auto px-4 border-t border-zinc-100 pt-6">
            <a href="#login" class="flex items-center gap-3 px-4 py-2 text-zinc-500 hover:text-primary transition-colors text-sm">
                <span class="material-symbols-outlined text-sm">logout</span>
                Logout
            </a>
        </div>

    <!-- Main Content Area -->
    <main id="main-container" class="lg:ml-64 min-h-screen flex flex-col">
        <!-- TopNavBar (Shared Component) -->
        <header id="app-header" class="sticky top-0 w-full z-30 bg-[#F8F9F8] border-b border-[#8B5E3C]/15 shadow-sm">
            <div class="flex justify-between items-center h-16 px-4 md:px-8 w-full mx-auto max-w-screen-2xl">

                    <button id="mobile-menu-btn" class="lg:hidden p-2 -ml-2 hover:bg-zinc-100 rounded-md transition-all material-symbols-outlined text-zinc-600">menu</button>
                    <h1 class="text-xl md:text-2xl font-black text-[#2D5A27] font-['Work_Sans'] tracking-tight flex items-center gap-2" id="header-title">

                    </h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <button class="p-2 hover:bg-zinc-100 rounded-md transition-all material-symbols-outlined text-zinc-600">notifications</button>

                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic View Content -->
        <div id="app-root" class="flex-grow flex flex-col"></div>
    </main>

    <script src="app.js"></script>
